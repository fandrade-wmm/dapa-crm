rootDir: web

runConfig:
  runtime: nodejs22
  cpu: 2
  memoryMiB: 1024
  concurrency: 100
  minInstances: 1
  maxInstances: 200

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBqIjCpzLZAxNfzIsaX8o12xBM5j6rcYq8"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "dapa-crm-assistant.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "dapa-crm-assistant"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "dapa-crm-assistant.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1089527733766"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:1089527733766:web:7635a247b29c3c36cbad87"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-358S1GKDK9"
    availability:
      - BUILD
      - RUNTIME

