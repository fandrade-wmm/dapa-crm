kind = "web"
previewPath = "/"
title = "Dapa Home WhatsApp Bot"
version = "1.0.0"
id = "artifacts/whatsapp-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23097
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/whatsapp-dashboard run dev"

[services.env]
PORT = "23097"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/whatsapp-dashboard", "run", "build"]
publicDir = "artifacts/whatsapp-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
