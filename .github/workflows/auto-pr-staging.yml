name: Auto PR — staging → main

on:
  push:
    branches: [staging]

jobs:
  auto-pr:
    name: Open PR staging → main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR staging → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "chore: promote staging → main" \
            --body "Automated PR: promote changes from staging to main." \
            || echo "PR already exists or nothing to promote"
